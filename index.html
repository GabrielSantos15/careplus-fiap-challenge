<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="shortcut icon" href="images/Logotipo-Care_Plus.svg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <title>CarePlus</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <img class="img-fluid" style="max-height:50px;" src="images/carePlus-logo.svg" alt="">
                </a>

                <!-- Botão lateral -->
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Menu normal (desktop) -->
                <div class="collapse navbar-collapse d-none d-lg-flex">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Serviços</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Sobre</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contato</a>
                        </li>
                    </ul>
                </div>

            </div>
        </nav>
    </header>
    <!-- MENU LATERAL -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">CarePlus</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="#">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Serviços</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Sobre</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contato</a>
                </li>
            </ul>
        </div>
    </div>
    <main>
        <div class="container">
            <div class="row align-items-center border-bottom p-4">
                <!-- Perfil -->
                <div class="col-md-8 d-flex align-items-center">
                    <!-- Foto -->
                    <img src="images/perfil.png" alt="Foto de perfil" class="rounded-circle me-3" width="150"
                        height="150">

                    <!-- Texto -->
                    <div>
                        <h5 class="display-6 mb-0">Olá Júlia</h5>

                        <!-- Estrelas -->
                        <div class="fs-3">
                            <span class="text-warning">&#9733;</span>
                            <span class="text-warning">&#9733;</span>
                            <span class="text-warning">&#9733;</span>
                            <span class="text-warning">&#9733;</span>
                            <span class="text-secondary">&#9733;</span>
                        </div>

                        <!-- Pontos -->
                        <small class="text-muted fs-5"><strong>1250</strong> pontos</small>
                    </div>
                </div>

                <!-- Logo -->
                <div class="col-md-4 text-end d-none d-md-block">
                    <img src="images/Logotipo-Care_Plus.svg" alt="Care Plus" class="img-fluid"
                        style="max-height:120px;">
                </div>
            </div>
        </div>
    </main>
</body>

</html>
